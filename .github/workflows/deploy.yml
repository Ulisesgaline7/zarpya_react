name: Deploy Frontend

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/zarpya-react
            git pull origin main
            npm install --legacy-peer-deps
            npm run build
            pm2 restart zarpya-react || pm2 start npm --name "zarpya-react" -- start
